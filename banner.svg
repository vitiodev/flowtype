<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#3ecfcf"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3ecfcf;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>

  <!-- Column separator -->
  <line x1="840" y1="40" x2="840" y2="360" stroke="url(#accent)" stroke-opacity="0.15" stroke-width="1"/>

  <!-- ===================== LEFT COLUMN (x: 50–820) ===================== -->
  <!-- Layout:
       y=87  → Mic icon top + Title baseline ~y=155
       y=185 → Tagline baseline
       y=207 → Divider
       y=227 → Steps boxes (height 36 → bottom y=263)
       y=283 → Recording pill (height 30 → bottom y=313)
       Vertical span: 87–313 = 226px, center = 87+113 = 200 ✓
  -->

  <!-- Glow behind mic -->
  <circle cx="87" cy="130" r="55" fill="#6c63ff" fill-opacity="0.07" filter="url(#glow)"/>

  <!-- Mic icon — translate(50, 87): total 84px tall, 42px wide (x 7–49), center (28,42) → abs (78, 129) -->
  <g transform="translate(50, 87)" filter="url(#softglow)">
    <rect x="7" y="0" width="28" height="52" rx="14" fill="url(#accent)" opacity="0.95"/>
    <path d="M0 48 Q0 72 21 72 Q42 72 42 48" stroke="url(#accent)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="21" y1="72" x2="21" y2="84" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="8"  y1="84" x2="34" y2="84" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Title "FlowType" — baseline y=155, font-size=68 -->
  <text x="110" y="155"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="68" font-weight="700" letter-spacing="-1.5"
        fill="url(#accent)" filter="url(#softglow)">FlowType</text>

  <!-- Tagline — baseline y=185 -->
  <text x="112" y="185"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="19" font-weight="300" fill="#b0b0cc" letter-spacing="0.5">
    Offline voice dictation for Ubuntu — no cloud, no subscription
  </text>

  <!-- Divider — y=207, x=50 to x=800 -->
  <rect x="50" y="207" width="750" height="1.5" fill="url(#accent)" opacity="0.25"/>

  <!-- ---- Steps row — boxes y=227, height=36, text baseline y=251 ---- -->
  <!-- Step widths: box(36) + gap(8) + text
       "Hold hotkey" ≈ 95px  → total ~139px
       arrow ≈ 30px + gap 15px each side
       "Speak" ≈ 50px        → total ~94px
       arrow ≈ 30px
       "Release — text appears" ≈ 175px → total ~219px
       Total ≈ 139+60+94+60+219 = 572px
       Start x = 50 + (750-572)/2 = 50+89 = 139 → use x=100 for left padding -->

  <!-- Step 1 -->
  <rect x="100" y="227" width="36" height="36" rx="8" fill="#6c63ff" fill-opacity="0.2"/>
  <text x="118" y="251" font-family="monospace" font-size="17" font-weight="700"
        fill="#6c63ff" text-anchor="middle">1</text>
  <text x="146" y="251" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="16" fill="#e0e0f0">Hold hotkey</text>

  <!-- Arrow 1 — after "Hold hotkey" (approx x=100+36+8+95=239) -->
  <text x="248" y="252" font-family="sans-serif" font-size="20" fill="#6c63ff" opacity="0.6">→</text>

  <!-- Step 2 -->
  <rect x="278" y="227" width="36" height="36" rx="8" fill="#5590cc" fill-opacity="0.2"/>
  <text x="296" y="251" font-family="monospace" font-size="17" font-weight="700"
        fill="#5590cc" text-anchor="middle">2</text>
  <text x="324" y="251" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="16" fill="#e0e0f0">Speak</text>

  <!-- Arrow 2 — after "Speak" (approx x=278+36+8+50=372) -->
  <text x="382" y="252" font-family="sans-serif" font-size="20" fill="#3ecfcf" opacity="0.6">→</text>

  <!-- Step 3 -->
  <rect x="412" y="227" width="36" height="36" rx="8" fill="#3ecfcf" fill-opacity="0.2"/>
  <text x="430" y="251" font-family="monospace" font-size="17" font-weight="700"
        fill="#3ecfcf" text-anchor="middle">3</text>
  <text x="458" y="251" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="16" fill="#e0e0f0">Release — text appears</text>

  <!-- Recording pill — y=283, height=30, width=138 -->
  <rect x="100" y="283" width="138" height="30" rx="15"
        fill="url(#pill)" opacity="0.85" filter="url(#softglow)"/>
  <circle cx="120" cy="298" r="6" fill="white" opacity="0.9"/>
  <text x="135" y="303"
        font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="13" font-weight="600" fill="white">Recording…</text>

  <!-- ===================== RIGHT COLUMN (x: 840–1200, w=360) ===================== -->
  <!-- Pills: width=230, centered in 360px → left margin=65 → x=840+65=905
       5 pills × 36px + 4 gaps × 12px = 228px
       top start = (400-228)/2 = 86
  -->

  <!-- Pill 1: y=86 -->
  <rect x="905" y="86" width="230" height="36" rx="18"
        fill="#6c63ff" fill-opacity="0.15" stroke="#6c63ff" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="928" cy="104" r="6" fill="#6c63ff" opacity="0.85"/>
  <text x="945" y="109" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="14" fill="#d8d8f0">Faster-Whisper (local)</text>

  <!-- Pill 2: y=134 -->
  <rect x="905" y="134" width="230" height="36" rx="18"
        fill="#3ecfcf" fill-opacity="0.10" stroke="#3ecfcf" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="928" cy="152" r="6" fill="#3ecfcf" opacity="0.85"/>
  <text x="945" y="157" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="14" fill="#d8d8f0">X11 &amp; Wayland</text>

  <!-- Pill 3: y=182 -->
  <rect x="905" y="182" width="230" height="36" rx="18"
        fill="#5590cc" fill-opacity="0.12" stroke="#5590cc" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="928" cy="200" r="6" fill="#5590cc" opacity="0.85"/>
  <text x="945" y="205" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="14" fill="#d8d8f0">CUDA acceleration</text>

  <!-- Pill 4: y=230 -->
  <rect x="905" y="230" width="230" height="36" rx="18"
        fill="#cc55aa" fill-opacity="0.12" stroke="#cc55aa" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="928" cy="248" r="6" fill="#cc55aa" opacity="0.85"/>
  <text x="945" y="253" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="14" fill="#d8d8f0">Voice commands</text>

  <!-- Pill 5: y=278 -->
  <rect x="905" y="278" width="230" height="36" rx="18"
        fill="#aacc55" fill-opacity="0.10" stroke="#aacc55" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="928" cy="296" r="6" fill="#aacc55" opacity="0.85"/>
  <text x="945" y="301" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="14" fill="#d8d8f0">MIT open source</text>

</svg>
