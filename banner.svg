<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#3ecfcf"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3ecfcf;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glow circle behind logo -->
  <circle cx="160" cy="200" r="90" fill="#6c63ff" fill-opacity="0.08" filter="url(#glow)"/>

  <!-- Mic icon -->
  <g transform="translate(115, 150)" filter="url(#softglow)">
    <!-- mic body -->
    <rect x="21" y="0" width="28" height="52" rx="14" fill="url(#accent)" opacity="0.95"/>
    <!-- mic stand -->
    <path d="M14 48 Q14 72 35 72 Q56 72 56 48" stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- stand line -->
    <line x1="35" y1="72" x2="35" y2="84" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <!-- base -->
    <line x1="22" y1="84" x2="48" y2="84" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- App name -->
  <text x="240" y="185" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="78" font-weight="700" letter-spacing="-2" fill="url(#accent)" filter="url(#softglow)">
    FlowType
  </text>

  <!-- Tagline -->
  <text x="242" y="228" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="300" fill="#c0c0d8" letter-spacing="1">
    Offline voice dictation for Ubuntu — no cloud, no subscription
  </text>

  <!-- Divider line -->
  <rect x="240" y="252" width="680" height="1.5" fill="url(#accent)" opacity="0.3"/>

  <!-- Flow steps -->
  <!-- Step 1 -->
  <g transform="translate(240, 275)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="#6c63ff" fill-opacity="0.2"/>
    <text x="18" y="25" font-family="monospace" font-size="18" font-weight="700"
          fill="#6c63ff" text-anchor="middle">1</text>
  </g>
  <text x="288" y="299" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="17" fill="#e0e0f0">Hold hotkey</text>

  <!-- Arrow -->
  <text x="390" y="299" font-family="sans-serif" font-size="20" fill="#6c63ff" opacity="0.7">→</text>

  <!-- Step 2 -->
  <g transform="translate(420, 275)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="#5590cc" fill-opacity="0.2"/>
    <text x="18" y="25" font-family="monospace" font-size="18" font-weight="700"
          fill="#5590cc" text-anchor="middle">2</text>
  </g>
  <text x="468" y="299" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="17" fill="#e0e0f0">Speak</text>

  <!-- Arrow -->
  <text x="540" y="299" font-family="sans-serif" font-size="20" fill="#3ecfcf" opacity="0.7">→</text>

  <!-- Step 3 -->
  <g transform="translate(570, 275)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="#3ecfcf" fill-opacity="0.2"/>
    <text x="18" y="25" font-family="monospace" font-size="18" font-weight="700"
          fill="#3ecfcf" text-anchor="middle">3</text>
  </g>
  <text x="618" y="299" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="17" fill="#e0e0f0">Release — text appears</text>

  <!-- Right side: feature pills -->
  <g transform="translate(900, 120)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#6c63ff" fill-opacity="0.15" stroke="#6c63ff" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="22" cy="18" r="6" fill="#6c63ff" opacity="0.8"/>
    <text x="40" y="24" font-family="'Segoe UI', 'Inter', sans-serif" font-size="15" fill="#d0d0f0">Faster-Whisper (local)</text>

    <!-- Pill 2 -->
    <rect x="0" y="50" width="220" height="36" rx="18" fill="#3ecfcf" fill-opacity="0.1" stroke="#3ecfcf" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="22" cy="68" r="6" fill="#3ecfcf" opacity="0.8"/>
    <text x="40" y="74" font-family="'Segoe UI', 'Inter', sans-serif" font-size="15" fill="#d0d0f0">X11 &amp; Wayland</text>

    <!-- Pill 3 -->
    <rect x="0" y="100" width="220" height="36" rx="18" fill="#5590cc" fill-opacity="0.12" stroke="#5590cc" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="22" cy="118" r="6" fill="#5590cc" opacity="0.8"/>
    <text x="40" y="124" font-family="'Segoe UI', 'Inter', sans-serif" font-size="15" fill="#d0d0f0">CUDA acceleration</text>

    <!-- Pill 4 -->
    <rect x="0" y="150" width="220" height="36" rx="18" fill="#cc55aa" fill-opacity="0.12" stroke="#cc55aa" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="22" cy="168" r="6" fill="#cc55aa" opacity="0.8"/>
    <text x="40" y="174" font-family="'Segoe UI', 'Inter', sans-serif" font-size="15" fill="#d0d0f0">Voice commands</text>

    <!-- Pill 5 -->
    <rect x="0" y="200" width="220" height="36" rx="18" fill="#aacc55" fill-opacity="0.10" stroke="#aacc55" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="22" cy="218" r="6" fill="#aacc55" opacity="0.8"/>
    <text x="40" y="224" font-family="'Segoe UI', 'Inter', sans-serif" font-size="15" fill="#d0d0f0">MIT open source</text>
  </g>

  <!-- Recording pill indicator (decorative) -->
  <rect x="242" y="338" width="120" height="28" rx="14" fill="url(#pill)" opacity="0.85" filter="url(#softglow)"/>
  <circle cx="262" cy="352" r="6" fill="white" opacity="0.9"/>
  <text x="280" y="358" font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="13" font-weight="600" fill="white">Recording…</text>

</svg>
